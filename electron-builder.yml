appId: com.onething.app
productName: 0neThing
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  # Exclude unnecessary files from node_modules
  - "!**/{CHANGELOG.md,README.md,readme.md,LICENSE,license,License}"
  - "!**/*.{d.ts,map,ts.map}"
  - "!**/test{,s}/**"
  - "!**/.{eslint,prettier,github,vscode}*"
  # onnxruntime-web is not needed in Electron main process
  - "!node_modules/onnxruntime-web"
  # Font packages are bundled by Vite into renderer, no need in asar
  - "!node_modules/@fontsource-variable"
  - "!node_modules/lxgw-wenkai-webfont"
  - "!node_modules/lxgw-wenkai-screen-webfont"

# Extra resources to include (copied to resources/ in the app bundle)
extraResources:
  - from: resources/templates
    to: templates
    filter:
      - "**/*"
  - from: resources/docs
    to: docs
    filter:
      - "**/*"

win:
  target:
    - nsis
    - portable

mac:
  target:
    - dmg
    - zip

linux:
  target:
    - AppImage
    - deb

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
